<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Nhập Liệu DAS V3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar mượt mà */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex flex-col lg:flex-row h-screen overflow-hidden bg-white font-sans text-slate-800">

    <div class="lg:w-1/3 bg-gradient-to-br from-slate-50 via-gray-50 to-slate-100 p-8 lg:p-12 flex flex-col justify-between border-r border-gray-200 shadow-[10px_0_20px_-10px_rgba(0,0,0,0.05)] z-10 relative">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-blue-600"></div>
        
        <div>
            <img src="LogoFCT.png" alt="FCT Logo" class="w-28 mb-8 drop-shadow-md" onerror="this.src='https://via.placeholder.com/150?text=Logo+FCT'">
            <h1 class="text-4xl lg:text-5xl font-extrabold text-slate-800 tracking-tight leading-tight mb-4">HỆ THỐNG<br><span class="text-blue-600">NHẬP LIỆU</span></h1>
            <p class="text-slate-500 text-sm lg:text-base font-medium leading-relaxed">Tự động hóa quy trình xuất hồ sơ ứng viên nhanh chóng, chuẩn xác và chuyên nghiệp.</p>
        </div>

        <div class="mt-10 border-t border-gray-200 pt-6">
            <div class="flex items-center gap-2 mb-1">
                <p class="text-[10px] text-slate-400 tracking-widest font-bold uppercase">Crafted by</p>
                <div class="w-18 h-12 flex items-center justify-center flex-shrink-0">
                    <img src="{{ url_for('static', filename='eagle_logo.png') }}" alt="Andrew Tseng Logo" class="w-full h-full object-contain drop-shadow-sm">
                </div>
            </div>
            <p class="text-xl font-bold text-slate-800 tracking-wide">Andrew Tseng</p>
        </div>
    </div>
    <div class="lg:w-2/3 h-full overflow-y-auto relative bg-[#FAFAFA] px-6 py-10 lg:px-16 lg:py-12">
        <form id="resumeForm" class="max-w-4xl mx-auto space-y-12 pb-32">
            
            <section>
                <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                    <span class="w-2 h-6 bg-blue-600 rounded-full"></span> 1. Thông tin cá nhân
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Mã số</label><input type="text" name="Maso" class="w-full border-b-2 border-gray-200 bg-transparent py-2 text-sm focus:border-blue-600 focus:outline-none transition-colors"></div>
                    <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Họ tên (Tiếng Việt)</label><input type="text" name="Hoten" class="w-full border-b-2 border-gray-200 bg-transparent py-2 text-sm focus:border-blue-600 focus:outline-none transition-colors"></div>
                    <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tên tiếng Trung</label><input type="text" name="TentiengTrung" class="w-full border-b-2 border-gray-200 bg-transparent py-2 text-sm focus:border-blue-600 focus:outline-none transition-colors"></div>
                    <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Ngày sinh</label><input type="text" name="Ngaysinh" class="w-full border-b-2 border-gray-200 bg-transparent py-2 text-sm focus:border-blue-600 focus:outline-none transition-colors"></div>
                    <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tuổi</label><input type="text" name="Tuoi" class="w-full border-b-2 border-gray-200 bg-transparent py-2 text-sm focus:border-blue-600 focus:outline-none transition-colors"></div>
                    <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Hôn nhân</label><input type="text" name="Honnhan" class="w-full border-b-2 border-gray-200 bg-transparent py-2 text-sm focus:border-blue-600 focus:outline-none transition-colors"></div>
                    <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Chiều cao (cm)</label><input type="text" name="Chieucao" class="w-full border-b-2 border-gray-200 bg-transparent py-2 text-sm focus:border-blue-600 focus:outline-none transition-colors"></div>
                    <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Cân nặng (kg)</label><input type="text" name="Cannang" class="w-full border-b-2 border-gray-200 bg-transparent py-2 text-sm focus:border-blue-600 focus:outline-none transition-colors"></div>
                    <div class="col-span-1 md:col-span-2"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Nơi ở</label><input type="text" name="Noio" class="w-full border-b-2 border-gray-200 bg-transparent py-2 text-sm focus:border-blue-600 focus:outline-none transition-colors"></div>
                    <div class="col-span-1 md:col-span-2"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Ảnh chân dung</label><input type="file" id="photoInput" accept="image/*" class="w-full text-sm mt-2"></div>
                </div>
            </section>

            <section>
                <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                    <span class="w-2 h-6 bg-blue-600 rounded-full"></span> 2. Gia đình
                </h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="col-span-2"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tên Bố</label><input type="text" name="HotenBo" class="w-full border-b-2 border-gray-200 py-1 text-sm focus:border-blue-600 focus:outline-none"></div>
                    <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tuổi</label><input type="text" name="TB" class="w-full border-b-2 border-gray-200 py-1 text-sm focus:border-blue-600 focus:outline-none"></div>
                    <div class="hidden md:block"></div>
                    <div class="col-span-2"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tên Mẹ</label><input type="text" name="HotenMe" class="w-full border-b-2 border-gray-200 py-1 text-sm focus:border-blue-600 focus:outline-none"></div>
                    <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tuổi</label><input type="text" name="TM" class="w-full border-b-2 border-gray-200 py-1 text-sm focus:border-blue-600 focus:outline-none"></div>
                </div>
            </section>

            <section>
                <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                    <span class="w-2 h-6 bg-blue-600 rounded-full"></span> 3. Sức khỏe & Thói quen
                </h2>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 grid grid-cols-2 md:grid-cols-4 gap-y-4 gap-x-2 text-sm">
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="f01" class="w-4 h-4 text-blue-600"> Thuận tay phải</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="f07" class="w-4 h-4 text-blue-600"> Thuận tay trái</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="f03" class="w-4 h-4 text-blue-600"> Hút thuốc</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="f09" class="w-4 h-4 text-blue-600"> Không hút</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="f04" class="w-4 h-4 text-blue-600"> Uống rượu</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="f10" class="w-4 h-4 text-blue-600"> Không uống</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="f12" class="w-4 h-4 text-blue-600"> Hình xăm</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="f15" class="w-4 h-4 text-blue-600"> Cận thị</label>
                </div>
            </section>

            <section>
                <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                    <span class="w-2 h-6 bg-blue-600 rounded-full"></span> 4. Kinh nghiệm & Đánh giá
                </h2>
                <div class="space-y-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="grid grid-cols-4 gap-4">
                        <div class="col-span-1"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Quốc gia 1</label><input type="text" name="QG1" class="w-full border-b-2 border-gray-200 py-2 text-sm focus:border-blue-600 focus:outline-none"></div>
                        <div class="col-span-1"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Năm</label><input type="text" name="N1" class="w-full border-b-2 border-gray-200 py-2 text-sm focus:border-blue-600 focus:outline-none"></div>
                        <div class="col-span-2"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Công việc</label><input type="text" name="ndcv1" class="w-full border-b-2 border-gray-200 py-2 text-sm focus:border-blue-600 focus:outline-none"></div>
                    </div>
                    
                    <div class="pt-4 mt-4 border-t border-gray-100">
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Đánh giá chung</label>
                        <textarea name="loi_binh_1" class="w-full border-2 border-gray-200 rounded-xl p-3 text-sm focus:border-blue-600 focus:outline-none h-24 bg-gray-50"></textarea>
                    </div>
                    <div class="mt-4">
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Người phụ trách</label>
                        <input type="text" name="f48" class="w-full border-b-2 border-gray-200 py-2 text-sm focus:border-blue-600 focus:outline-none w-1/2">
                    </div>
                </div>
            </section>
        </form>

        <div class="fixed bottom-8 right-8 z-50">
            <button type="button" onclick="handleSubmit()" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 px-10 rounded-full shadow-[0_10px_25px_rgba(37,99,235,0.4)] transition-all transform hover:-translate-y-1 flex items-center gap-3">
                <span id="btnText">XUẤT FILE HỒ SƠ</span>
                <div id="loading" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <script>
        async function handleSubmit() {
            const form = document.getElementById('resumeForm');
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loading');
            
            btnText.innerText = "ĐANG XỬ LÝ...";
            loading.classList.remove('hidden');

            const formData = new FormData();
            const plainData = {};
            
            new FormData(form).forEach((value, key) => {
                if (form.elements[key].type === 'checkbox') {
                    plainData[key] = form.elements[key].checked;
                } else {
                    plainData[key] = value;
                }
            });

            formData.append('data', JSON.stringify(plainData));
            
            const photoFile = document.getElementById('photoInput').files[0];
            if (photoFile) formData.append('photo', photoFile);

            try {
                const response = await fetch('/api/generate', { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) window.location.href = result.downloadUrl;
                else alert("Lỗi: " + result.error);
            } catch (error) {
                alert("Lỗi kết nối máy chủ.");
            } finally {
                btnText.innerText = "XUẤT FILE HỒ SƠ";
                loading.classList.add('hidden');
            }
        }

        window.addEventListener('load', fillDummyData);
    </script>
</body>
</html>
